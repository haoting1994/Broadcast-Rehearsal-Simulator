  const [camsKeynote, setCamsKeynote] = useState([{

  const cams = opening.sessionType === "keynote" ? camsKeynote : camsPanel;

  // freely-draggable overlay cards: title cards (people) + QA tag cards
  const [cgCards, setCgCards] = useState([]);

  const [qaCues, setQaCues] = useState([{
